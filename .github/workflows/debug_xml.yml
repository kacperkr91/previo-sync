name: Debug XML

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ksef-client
      - name: Debug XML
        env:
          KSEF_TOKEN: ${{ secrets.KSEF_TOKEN }}
        run: python debug_xml.py
