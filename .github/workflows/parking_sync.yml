name: Parking Sync

on:
  schedule:
    # Co godzinę pn-pt, 7:00-19:00 CET (6:00-18:00 UTC)
    - cron: '0 6-18 * * 1-5'
  workflow_dispatch:  # Możliwość uruchomienia ręcznie

jobs:
  parking-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client

      - name: Run parking sync
        env:
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          PARKING_SPREADSHEET_ID: ${{ secrets.PARKING_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python parking_sync.py
