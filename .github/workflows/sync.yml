# Previo -> Google Sheets Sync

Automatyczny sync rezerwacji z Previo API do Google Sheets co godzinę.

## Konfiguracja

### 1. GitHub Secrets
W repozytorium GitHub → Settings → Secrets → Actions dodaj:
- `PREVIO_LOGIN` — login do Previo (kacper@oldtownvistula.pl)
- `PREVIO_PASS` — hasło do Previo
- `PREVIO_HOT_ID` — ID hotelu (762331)
- `GOOGLE_SHEET_ID` — ID arkusza Google Sheets
- `GOOGLE_SERVICE_ACCOUNT` — JSON z kluczem Service Account

### 2. Google Service Account
1. Wejdź na console.cloud.google.com
2. APIs & Services → Credentials → Create Service Account
3. Pobierz JSON z kluczem
4. Udostępnij arkusz Google Sheets temu Service Account (email z JSON)
5. Wklej cały JSON jako secret GOOGLE_SERVICE_ACCOUNT

### 3. Uruchomienie
Actions → Sync Previo to Google Sheets → Run workflow (test ręczny)
