name: Sync Previo to Google Sheets

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-all:
    name: Sync all reservations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run sync
        env:
          PREVIO_LOGIN: ${{ secrets.PREVIO_LOGIN }}
          PREVIO_PASS: ${{ secrets.PREVIO_PASS }}
          PREVIO_HOT_ID: ${{ secrets.PREVIO_HOT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python sync.py

  daily-sheets:
    name: Daily reservations sheet
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Warsaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily sync
        env:
          PREVIO_LOGIN: ${{ secrets.PREVIO_LOGIN }}
          PREVIO_PASS: ${{ secrets.PREVIO_PASS }}
          PREVIO_HOT_ID: ${{ secrets.PREVIO_HOT_ID }}
          DAILY_SHEET_ID: ${{ secrets.DAILY_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python daily_sheets.py
